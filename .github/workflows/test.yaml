name: "Run tests"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        go-version: 
          - 1.23.9
          - 1.24.0
          - 1.24.1
          - 1.24.2
          - 1.25.0
          - 1.25.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install dependencies
        run: go mod download
      - name: Install wasirun
        run: |
          go install github.com/stealthrocket/wasi-go/cmd/wasirun@latest
      - name: Run tests
        run: go test -v ./...
